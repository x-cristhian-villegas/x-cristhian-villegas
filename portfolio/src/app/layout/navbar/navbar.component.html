<header class="header" [class.header--scrolled]="isScrolled()">
  <nav class="header__nav">
    <a class="header__logo" (click)="goHome()" tabindex="0">
      <img src="icon-512.png" alt="Cristhian Villegas" width="32" height="32" class="header__logo-icon" />
    </a>

    <ul class="header__menu">
      @for (link of navLinks; track link.labelKey) {
        <li>
          <a
            class="header__menu-link"
            (click)="navigate(link)"
            tabindex="0">
            <span class="header__menu-number">0{{ $index + 1 }}.</span>
            {{ link.labelKey | t }}
          </a>
        </li>
      }
    </ul>

    <div class="header__actions">
      <button
        class="header__theme-toggle"
        (click)="toggleLang()"
        [attr.aria-label]="'Switch language'">
        {{ langLabel() }}
      </button>

      <button
        class="header__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeLabel()">
        {{ themeIcon() }}
      </button>

      <a class="header__cta" (click)="navigate({ labelKey: 'nav.contact', href: '#contact' })" tabindex="0">
        {{ 'nav.contact' | t }}
      </a>

      <button
        class="header__burger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-label="Toggle menu">
        <span class="header__burger-line" [class.header__burger-line--open]="isMobileMenuOpen()"></span>
        <span class="header__burger-line" [class.header__burger-line--open]="isMobileMenuOpen()"></span>
        <span class="header__burger-line" [class.header__burger-line--open]="isMobileMenuOpen()"></span>
      </button>
    </div>
  </nav>

  @if (isMobileMenuOpen()) {
    <div class="header__mobile-overlay" (click)="closeMenu()"></div>
    <aside class="header__mobile-panel">
      <div class="header__mobile-links">
        @for (link of navLinks; track link.labelKey) {
          <a
            class="header__mobile-link"
            (click)="navigate(link)">
            <span class="header__mobile-number">0{{ $index + 1 }}.</span>
            {{ link.labelKey | t }}
          </a>
        }
      </div>
      <a class="header__mobile-cta" (click)="navigate({ labelKey: 'nav.contact', href: '#contact' })">
        {{ 'nav.contact' | t }}
      </a>
    </aside>
  }
</header>
