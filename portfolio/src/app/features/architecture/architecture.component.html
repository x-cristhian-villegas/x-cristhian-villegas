<section class="arch" id="architecture">
  <div class="arch__container">
    <div class="arch__header" appScrollReveal>
      <p class="arch__label">
        <span class="arch__label-line"></span>
        Architecture
      </p>
      <h2 class="arch__title">
        How I build
        <span class="arch__title--accent">systems</span>
      </h2>
    </div>

    <div class="arch__grid">
      @for (layer of layers; track trackByName($index, layer)) {
        <div class="arch__card" appScrollReveal>
          <div class="arch__card-stripe" [style.background]="layer.color"></div>
          <span class="arch__card-number" [style.color]="layer.color">0{{ $index + 1 }}</span>
          <h3 class="arch__card-name">{{ layer.name }}</h3>
          <div class="arch__card-techs">
            @for (item of layer.items; track trackByIndex($index)) {
              <span class="arch__card-tech">{{ item }}</span>
            }
          </div>
        </div>
      }
    </div>

    <div class="arch__bottom" appScrollReveal>
      <span class="arch__bottom-label">Built with</span>
      <div class="arch__pills">
        @for (p of principles; track trackByIndex($index)) {
          <span class="arch__pill">{{ p }}</span>
        }
      </div>
    </div>
  </div>
</section>
